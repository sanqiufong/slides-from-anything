<svg xmlns="http://www.w3.org/2000/svg" width="2400" height="1350" viewBox="0 0 2400 1350" role="img" aria-labelledby="title desc">
  <title id="title">Slides from Anything 从材料到交付的系统闭环</title>
  <desc id="desc">中文版系统闭环图，展示 Slides from Anything 从材料输入、目标对齐、Design Vault、页面生成、质量检查、精修反馈到多格式交付的流程。</desc>
  <defs>
    <linearGradient id="bg" x1="110" y1="110" x2="2260" y2="1230" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#eef5ff"/>
      <stop offset="0.48" stop-color="#fbfafd"/>
      <stop offset="1" stop-color="#e9f8f4"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" x2="1">
      <stop offset="0" stop-color="#4f6fe8"/>
      <stop offset="1" stop-color="#2f8cf0"/>
    </linearGradient>
    <linearGradient id="teal" x1="0" x2="1">
      <stop offset="0" stop-color="#169982"/>
      <stop offset="1" stop-color="#28b69a"/>
    </linearGradient>
    <linearGradient id="purple" x1="0" x2="1">
      <stop offset="0" stop-color="#6d55df"/>
      <stop offset="1" stop-color="#8a64e9"/>
    </linearGradient>
    <linearGradient id="red" x1="0" x2="1">
      <stop offset="0" stop-color="#e64d4d"/>
      <stop offset="1" stop-color="#ef6d61"/>
    </linearGradient>
    <linearGradient id="orange" x1="0" x2="1">
      <stop offset="0" stop-color="#ef9a1a"/>
      <stop offset="1" stop-color="#f4b12d"/>
    </linearGradient>
    <filter id="panelShadow" x="-10%" y="-18%" width="120%" height="145%">
      <feDropShadow dx="0" dy="30" stdDeviation="34" flood-color="#162033" flood-opacity="0.10"/>
    </filter>
    <filter id="cardShadow" x="-18%" y="-24%" width="136%" height="156%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#172033" flood-opacity="0.09"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M1.5 1.4 L8.4 5 L1.5 8.6" fill="none" stroke="#9aaac0" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrowWarm" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M1.5 1.4 L8.4 5 L1.5 8.6" fill="none" stroke="#ee8d87" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      .text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", Arial, sans-serif; letter-spacing: 0; }
      .title { fill: #0f172a; font-size: 58px; font-weight: 760; }
      .subtitle { fill: #60708a; font-size: 30px; font-weight: 430; }
      .lane-label { fill: #566780; font-size: 25px; font-weight: 700; }
      .card-title { fill: #101827; font-size: 32px; font-weight: 760; }
      .card-sub { fill: #718098; font-size: 21px; font-weight: 480; }
      .number { fill: #fff; font-size: 20px; font-weight: 760; }
      .note { fill: #155ea6; font-size: 28px; font-weight: 720; }
      .pill-title { fill: #111827; font-size: 28px; font-weight: 760; }
      .pill-sub { fill: #77849a; font-size: 22px; font-weight: 480; }
      .connector { stroke: #9aaac0; stroke-width: 4; stroke-linecap: round; fill: none; marker-end: url(#arrow); }
      .feedback { stroke: #ee8d87; stroke-width: 4; stroke-linecap: round; stroke-dasharray: 10 14; fill: none; marker-end: url(#arrowWarm); }
    </style>
  </defs>

  <rect x="42" y="42" width="2316" height="1266" rx="38" fill="url(#bg)"/>

  <text class="text title" x="178" y="176">Slides from Anything：从材料到交付的系统闭环</text>
  <text class="text subtitle" x="178" y="235">把审美、叙事、质量检查和反馈精修连成一条可复用链路，而不是只做一次自动排版。</text>

  <rect x="160" y="312" width="2080" height="785" rx="56" fill="#fff" filter="url(#panelShadow)"/>
  <rect x="230" y="386" width="1940" height="255" rx="32" fill="#f8fbff" stroke="#dbe8f7" stroke-width="1.6"/>
  <rect x="230" y="760" width="1940" height="255" rx="32" fill="#fbfdff" stroke="#dfe9f5" stroke-width="1.6"/>

  <text class="text lane-label" x="276" y="438">输入与生成</text>
  <text class="text lane-label" x="276" y="812">检查与交付</text>

  <g transform="translate(315 470)">
    <rect width="360" height="152" rx="26" fill="#fff" stroke="#d8e5f4" stroke-width="2" filter="url(#cardShadow)"/>
    <rect x="26" y="34" width="64" height="64" rx="18" fill="url(#blue)"/>
    <text class="text number" x="58" y="73" text-anchor="middle">01</text>
    <text class="text card-title" x="114" y="68">材料输入</text>
    <text class="text card-sub" x="114" y="102">文档 · 网页 · 图片</text>
    <text class="text card-sub" x="114" y="126">笔记 · 原始想法</text>
    <rect x="34" y="134" width="292" height="8" rx="4" fill="#e4fff8"/>
  </g>

  <g transform="translate(785 470)">
    <rect width="360" height="152" rx="26" fill="#fff" stroke="#d8e5f4" stroke-width="2" filter="url(#cardShadow)"/>
    <rect x="26" y="34" width="64" height="64" rx="18" fill="url(#blue)"/>
    <text class="text number" x="58" y="73" text-anchor="middle">02</text>
    <text class="text card-title" x="114" y="68">目标对齐</text>
    <text class="text card-sub" x="114" y="102">受众 · 场景</text>
    <text class="text card-sub" x="114" y="126">记忆点 · 行动</text>
    <rect x="34" y="134" width="292" height="8" rx="4" fill="#e4fff8"/>
  </g>

  <g transform="translate(1255 470)">
    <rect width="360" height="152" rx="26" fill="#fff" stroke="#d8e5f4" stroke-width="2" filter="url(#cardShadow)"/>
    <rect x="26" y="34" width="64" height="64" rx="18" fill="url(#teal)"/>
    <text class="text number" x="58" y="73" text-anchor="middle">03</text>
    <text class="text card-title" x="114" y="68">Design Vault</text>
    <text class="text card-sub" x="114" y="102">把参考沉淀为</text>
    <text class="text card-sub" x="114" y="126">可调用设计系统</text>
    <rect x="34" y="134" width="292" height="8" rx="4" fill="#e4fff8"/>
  </g>

  <g transform="translate(1725 470)">
    <rect width="360" height="152" rx="26" fill="#fff" stroke="#d8e5f4" stroke-width="2" filter="url(#cardShadow)"/>
    <rect x="26" y="34" width="64" height="64" rx="18" fill="url(#purple)"/>
    <text class="text number" x="58" y="73" text-anchor="middle">04</text>
    <text class="text card-title" x="114" y="68">页面生成</text>
    <text class="text card-sub" x="114" y="102">叙事结构</text>
    <text class="text card-sub" x="114" y="126">版式约束</text>
    <rect x="34" y="134" width="292" height="8" rx="4" fill="#fbf0ff"/>
  </g>

  <path class="connector" d="M690 546 H770"/>
  <path class="connector" d="M1160 546 H1240"/>
  <path class="connector" d="M1630 546 H1710"/>
  <path class="connector" d="M1905 622 V817"/>
  <path class="feedback" d="M1436 840 C1392 770 1398 692 1476 632"/>

  <rect x="455" y="674" width="1490" height="72" rx="30" fill="#edf8ff" stroke="#b9ddff" stroke-width="2"/>
  <text class="text note" x="1200" y="720" text-anchor="middle">闭环关键：每次生成不是终点，检查与精修会沉淀为下一次可调用的判断。</text>

  <g transform="translate(1725 840)">
    <rect width="360" height="152" rx="26" fill="#fff" stroke="#d8e5f4" stroke-width="2" filter="url(#cardShadow)"/>
    <rect x="26" y="34" width="64" height="64" rx="18" fill="url(#orange)"/>
    <text class="text number" x="58" y="73" text-anchor="middle">05</text>
    <text class="text card-title" x="114" y="68">质量检查</text>
    <text class="text card-sub" x="114" y="102">可读性 · 层级</text>
    <text class="text card-sub" x="114" y="126">复现度 · 风险</text>
    <rect x="34" y="134" width="292" height="8" rx="4" fill="#fff7d7"/>
  </g>

  <g transform="translate(1255 840)">
    <rect width="360" height="152" rx="26" fill="#fff" stroke="#d8e5f4" stroke-width="2" filter="url(#cardShadow)"/>
    <rect x="26" y="34" width="64" height="64" rx="18" fill="url(#red)"/>
    <text class="text number" x="58" y="73" text-anchor="middle">06</text>
    <text class="text card-title" x="114" y="68">精修反馈</text>
    <text class="text card-sub" x="114" y="102">人类判断进入</text>
    <text class="text card-sub" x="114" y="126">下一轮迭代</text>
    <rect x="34" y="134" width="292" height="8" rx="4" fill="#fff0ed"/>
  </g>

  <g transform="translate(785 840)">
    <rect width="360" height="152" rx="26" fill="#fff" stroke="#d8e5f4" stroke-width="2" filter="url(#cardShadow)"/>
    <rect x="26" y="34" width="64" height="64" rx="18" fill="url(#teal)"/>
    <text class="text number" x="58" y="73" text-anchor="middle">07</text>
    <text class="text card-title" x="114" y="68">多格式交付</text>
    <text class="text card-sub" x="114" y="102">预览 · HTML/PDF</text>
    <text class="text card-sub" x="114" y="126">PPTX 继续编辑</text>
    <rect x="34" y="134" width="292" height="8" rx="4" fill="#e4fff8"/>
  </g>

  <path class="connector" d="M1725 916 H1630"/>
  <path class="connector" d="M1255 916 H1160"/>

  <g transform="translate(330 1148)">
    <rect width="355" height="84" rx="25" fill="#fff" stroke="#dbe6f4" stroke-width="2" filter="url(#cardShadow)"/>
    <text class="text pill-title" x="42" y="52">预览</text>
    <text class="text pill-sub" x="142" y="52">实时协作</text>
  </g>
  <g transform="translate(765 1148)">
    <rect width="355" height="84" rx="25" fill="#fff" stroke="#dbe6f4" stroke-width="2" filter="url(#cardShadow)"/>
    <text class="text pill-title" x="42" y="52">HTML</text>
    <text class="text pill-sub" x="145" y="52">在线交付</text>
  </g>
  <g transform="translate(1200 1148)">
    <rect width="355" height="84" rx="25" fill="#fff" stroke="#dbe6f4" stroke-width="2" filter="url(#cardShadow)"/>
    <text class="text pill-title" x="42" y="52">PDF</text>
    <text class="text pill-sub" x="126" y="52">留档分发</text>
  </g>
  <g transform="translate(1635 1148)">
    <rect width="355" height="84" rx="25" fill="#fff" stroke="#dbe6f4" stroke-width="2" filter="url(#cardShadow)"/>
    <text class="text pill-title" x="42" y="52">PPTX</text>
    <text class="text pill-sub" x="144" y="52">继续编辑</text>
  </g>
</svg>
